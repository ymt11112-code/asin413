<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作業清點小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .status-btn {
            padding: 0.5rem 0.5rem;
            border-radius: 0.375rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
            border: none;
            width: 90px; /* 固定寬度縮小 */
            text-align: center;
        }
        .status-btn:active {
            transform: scale(0.95);
        }
        .table-cell {
            padding: 0.75rem;
            text-align: center;
            vertical-align: middle;
            border: 1px solid #e5e7eb;
            white-space: nowrap;
        }
        .header-cell {
            padding: 0.75rem;
            text-align: center;
            vertical-align: middle;
            border: 1px solid #e5e7eb;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .header-cell:hover {
            background-color: #f0f0f0 !important; /* Add important to override category color on hover */
        }
        .category-tag {
            cursor: pointer;
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.125rem 0.5rem;
            border-radius: 9999px;
            margin-top: 0.25rem;
            border-width: 1px;
            transition: background-color 0.2s;
        }
        .interactive-status-item {
             display: inline-block;
             padding: 0.125rem 0.5rem;
             margin: 0.125rem;
             border-radius: 0.25rem;
             cursor: pointer;
             transition: background-color 0.2s;
             border: 1px solid #e5e7eb;
        }
        .interactive-status-item:hover {
            background-color: #f3f4f6;
        }
        .collapsible-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <div id="app-container" class="container mx-auto p-4 md:p-8 max-w-7xl">
        <h1 class="text-3xl font-bold text-center text-gray-800 mb-6">作業清點小幫手</h1>

        <!-- 設定區 -->
        <div id="setup-section" class="bg-white p-6 rounded-lg shadow-md mb-8">
            <h2 class="text-xl font-semibold mb-4">首次設定</h2>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-2">1. 匯入資料 (可匯入學生名單或完整備份):</label>
                <button id="import-csv-btn" class="w-full bg-sky-500 text-white py-2 px-4 rounded-md hover:bg-sky-600 font-semibold">匯入 CSV</button>
                <input type="file" id="csv-file-input" class="hidden" accept=".csv">
            </div>

            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-gray-300"></div>
                <span class="flex-shrink mx-4 text-gray-500 text-sm">或</span>
                <div class="flex-grow border-t border-gray-300"></div>
            </div>

            <div class="mb-4">
                <label for="student-list" class="block text-sm font-medium text-gray-700 mb-2">2. 手動貼上學生名單 (一行一個，格式：座號 姓名 組別):</label>
                 <div class="flex justify-end mb-1">
                     <button id="download-csv-template-btn" class="text-xs bg-gray-200 text-gray-700 py-1 px-2 rounded-md hover:bg-gray-300 font-semibold">下載CSV範本</button>
                </div>
                <textarea id="student-list" rows="10" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500" placeholder="1 王小明 1A
2 陳大華 1B
3 林美麗 2A"></textarea>
            </div>
            <div class="mb-4">
                <label for="sheet-url" class="block text-sm font-medium text-gray-700 mb-2">3. (可選) 貼上您的 Google Sheet 連結:</label>
                <input type="url" id="sheet-url" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500" placeholder="https://docs.google.com/spreadsheets/d/...">
            </div>
            <button id="start-btn" class="w-full bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 font-semibold">開始使用</button>
            
            <p class="text-xs text-gray-500 mt-6">注意：所有資料將安全地儲存在您的瀏覽器中。清除瀏覽器快取可能會導致資料遺失。</p>
        </div>

        <!-- 主操作區 -->
        <div id="main-section" class="hidden">
            <div class="flex flex-wrap justify-center gap-2 mb-6">
                <a id="open-sheet-btn" href="#" class="bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 font-semibold">開啟資料庫</a>
                <button id="show-status-btn" class="bg-orange-500 text-white py-2 px-4 rounded-md hover:bg-orange-600 font-semibold">作業狀態</button>
                <button id="sort-btn" class="bg-purple-500 text-white py-2 px-4 rounded-md hover:bg-purple-600 font-semibold">依組別排列</button>
                <button id="export-csv-btn" class="bg-teal-500 text-white py-2 px-4 rounded-md hover:bg-teal-600 font-semibold">匯出 CSV</button>
                <button id="undo-btn" class="bg-gray-500 text-white py-2 px-4 rounded-md hover:bg-gray-600 font-semibold opacity-50 cursor-not-allowed" disabled>還原</button>
                <button id="redo-btn" class="bg-gray-500 text-white py-2 px-4 rounded-md hover:bg-gray-600 font-semibold opacity-50 cursor-not-allowed" disabled>重做</button>
                <button id="reset-btn" class="bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 font-semibold">重設所有資料</button>
            </div>
            
            <div class="bg-white p-6 rounded-lg shadow-md mb-8">
                <div class="flex flex-col sm:flex-row gap-4">
                    <input type="text" id="new-assignment-name" class="flex-grow p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500" placeholder="輸入作業名稱，可用頓號、空格批次新增 (例: 國習L1、數習P2)">
                    <button id="add-assignment-btn" class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 font-semibold">新增作業</button>
                </div>
            </div>

            <!-- 作業表格 -->
            <div class="overflow-x-auto bg-white rounded-lg shadow-md">
                <table id="homework-table" class="w-full border-collapse">
                    <thead id="table-head" class="bg-gray-100"></thead>
                    <tbody id="table-body"></tbody>
                    <tfoot id="table-foot" class="bg-gray-100"></tfoot>
                </table>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="status-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-gray-100 rounded-lg shadow-xl max-w-6xl w-full max-h-[90vh] overflow-y-auto p-6 relative">
             <div class="flex justify-between items-center mb-6 relative">
                <div class="flex items-center gap-2">
                     <button id="expand-all-btn" class="bg-blue-100 text-blue-700 text-xs font-semibold py-1 px-3 rounded-full hover:bg-blue-200">全部展開</button>
                     <button id="collapse-all-btn" class="bg-gray-200 text-gray-700 text-xs font-semibold py-1 px-3 rounded-full hover:bg-gray-300">全部收合</button>
                </div>
                <h2 class="text-2xl font-bold text-center text-gray-800 absolute left-1/2 -translate-x-1/2">各項作業狀態總覽</h2>
                <div class="flex items-center gap-2">
                    <button id="toggle-names-btn" class="bg-gray-200 text-gray-700 text-xs font-semibold py-1 px-3 rounded-full hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400" title="切換姓名顯示">隱藏姓名</button>
                    <button id="refresh-status-btn" class="bg-blue-100 text-blue-700 rounded-full p-2 hover:bg-blue-200 focus:outline-none focus:ring-2 focus:ring-blue-400" title="重新整理">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 110 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" /></svg>
                    </button>
                </div>
            </div>
            <div id="status-content" class="space-y-4"></div>
            <button id="close-status-modal-btn" class="absolute top-4 right-4 bg-gray-200 text-gray-800 rounded-full p-2 hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
        </div>
    </div>

    <div id="student-status-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-4xl w-full max-h-[90vh] overflow-y-auto p-6 relative">
            <div class="flex justify-between items-center mb-2 relative">
                <div class="flex items-center gap-2">
                    <button id="one-click-complete-btn" class="bg-green-500 text-white py-1 px-3 rounded-md hover:bg-green-600 font-semibold text-sm">一鍵完成</button>
                    <button id="undo-student-btn" class="bg-gray-500 text-white py-1 px-3 rounded-md hover:bg-gray-600 font-semibold text-sm opacity-50 cursor-not-allowed" disabled>還原</button>
                    <button id="redo-student-btn" class="bg-gray-500 text-white py-1 px-3 rounded-md hover:bg-gray-600 font-semibold text-sm opacity-50 cursor-not-allowed" disabled>重做</button>
                </div>
                <h2 id="student-status-title" class="text-2xl font-bold text-center text-gray-800 absolute left-1/2 -translate-x-1/2 w-max"></h2>
                <div class="flex items-center gap-2">
                    <button id="refresh-student-status-btn" class="bg-blue-100 text-blue-700 rounded-full p-2 hover:bg-blue-200 focus:outline-none focus:ring-2 focus:ring-blue-400" title="重新整理"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 110 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z" clip-rule="evenodd" /></svg></button>
                    <button id="close-student-status-modal-btn" class="bg-gray-200 text-gray-800 rounded-full p-2 hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
                </div>
            </div>
            <div class="flex justify-center items-center gap-4 mb-4">
                <button id="prev-student-btn" class="bg-gray-200 text-gray-800 py-2 px-4 rounded-md hover:bg-gray-300 font-semibold">&lt; 上一位</button>
                <select id="student-select-dropdown" class="p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 max-w-xs"></select>
                <button id="next-student-btn" class="bg-gray-200 text-gray-800 py-2 px-4 rounded-md hover:bg-gray-300 font-semibold">下一位 &gt;</button>
            </div>
            <div id="student-status-summary" class="bg-red-100 border border-red-300 text-red-800 text-center p-3 rounded-md mb-6"></div>
            <div id="student-status-content"></div>
            <div id="student-status-completed-section" class="mt-8 pt-6 border-t border-gray-200"></div>
        </div>
    </div>
    
    <div id="group-status-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-6xl w-full max-h-[90vh] overflow-y-auto p-6 relative">
            <div class="flex justify-between items-center mb-4 relative">
                 <h2 id="group-status-title" class="text-2xl font-bold text-gray-800">各組作業概況</h2>
                 <div class="flex items-center gap-4">
                    <button id="toggle-group-view-btn" class="py-2 px-4 rounded-md text-sm font-semibold"></button>
                    <select id="group-select-dropdown" class="p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500"></select>
                 </div>
                 <button id="close-group-status-modal-btn" class="absolute -top-2 -right-2 bg-gray-200 text-gray-800 rounded-full p-2 hover:bg-gray-300 focus:outline-none focus:ring-2 focus:ring-gray-400"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
            <div id="group-status-content" class="space-y-4"></div>
        </div>
    </div>

    <div id="confirm-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-sm w-full p-6 text-center">
            <h3 class="text-lg font-semibold mb-4" id="confirm-modal-text">您確定要執行此操作嗎？</h3>
            <div class="flex justify-center gap-4">
                <button id="cancel-delete-btn" class="bg-gray-300 text-gray-800 py-2 px-6 rounded-md hover:bg-gray-400 font-semibold">取消</button>
                <button id="confirm-delete-btn" class="bg-red-600 text-white py-2 px-6 rounded-md hover:bg-red-700 font-semibold">確定</button>
            </div>
        </div>
    </div>
    
    <div id="batch-input-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
            <h2 id="batch-input-title" class="text-xl font-bold mb-4 text-center">批次輸入座號</h2>
            <div class="space-y-4">
                <div>
                    <label for="corrected-input" class="block text-sm font-medium text-blue-600">已訂正 (座號)</label>
                    <input type="text" id="corrected-input" class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500" placeholder="用空格或逗號分隔座號">
                </div>
                <div>
                    <label for="needs-correction-input" class="block text-sm font-medium text-yellow-600">待訂正 (座號)</label>
                    <input type="text" id="needs-correction-input" class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-yellow-500" placeholder="用空格或逗號分隔座號">
                </div>
                <div>
                    <label for="not-submitted-input" class="block text-sm font-medium text-red-600">未繳交 (座號)</label>
                    <input type="text" id="not-submitted-input" class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-red-500" placeholder="用空格或逗號分隔座號">
                </div>
                <div>
                    <label for="missing-signature-input" class="block text-sm font-medium text-purple-600">缺簽名 (座號)</label>
                    <input type="text" id="missing-signature-input" class="mt-1 w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-purple-500" placeholder="用空格或逗號分隔座號">
                </div>
            </div>
            <div class="flex justify-end gap-4 mt-6">
                <button id="cancel-batch-input-btn" class="bg-gray-300 text-gray-800 py-2 px-4 rounded-md hover:bg-gray-400 font-semibold">取消</button>
                <button id="confirm-batch-input-btn" class="bg-indigo-600 text-white py-2 px-4 rounded-md hover:bg-indigo-700 font-semibold">確認送出</button>
            </div>
        </div>
    </div>
    
    <div id="choice-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-sm w-full p-6 text-center">
            <h3 class="text-lg font-semibold mb-4">請選擇下一個狀態：</h3>
            <div id="choice-modal-buttons" class="flex flex-wrap justify-center gap-4"></div>
            <button id="cancel-choice-btn" class="mt-6 bg-gray-300 text-gray-800 py-2 px-6 rounded-md hover:bg-gray-400 font-semibold">取消</button>
        </div>
    </div>

    <script type="module">
        // --- App State ---
        let appState = { students: [], assignments: [], sheetUrl: '' };
        let history = [];
        let historyIndex = -1;
        let sortBy = 'number';
        let statusModalShowNames = true;
        let groupView = 'individual'; // 'individual' or 'all'
        const STATUSES = ['未繳交', '已繳交', '待訂正', '已訂正', '缺簽名'];
        const STATUS_COLORS = { '未繳交': 'bg-red-500 hover:bg-red-600', '已繳交': 'bg-green-500 hover:bg-green-600', '待訂正': 'bg-yellow-500 hover:bg-yellow-600', '已訂正': 'bg-blue-500 hover:bg-blue-600', '缺簽名': 'bg-purple-500 hover:bg-purple-600' };
        const CATEGORIES = ['國語', '數學', '聯絡簿', '音樂', '其他'];
        const CATEGORY_COLORS = { 
            '國語': 'bg-blue-50', 
            '數學': 'bg-pink-50', 
            '聯絡簿': 'bg-green-50',
            '音樂': 'bg-gray-100',
            '其他': '' 
        };
        const CATEGORY_TAG_COLORS = {
            '國語': 'bg-blue-100 text-blue-800 border-blue-200 hover:bg-blue-200',
            '數學': 'bg-pink-100 text-pink-800 border-pink-200 hover:bg-pink-200',
            '聯絡簿': 'bg-green-100 text-green-800 border-green-200 hover:bg-green-200',
            '音樂': 'bg-gray-200 text-gray-800 border-gray-300 hover:bg-gray-300',
            '其他': 'bg-gray-100 text-gray-800 border-gray-200 hover:bg-gray-200'
        };

        // --- DOM Elements ---
        const setupSection = document.getElementById('setup-section');
        const mainSection = document.getElementById('main-section');
        const studentListInput = document.getElementById('student-list');
        const sheetUrlInput = document.getElementById('sheet-url');
        const startBtn = document.getElementById('start-btn');
        const openSheetBtn = document.getElementById('open-sheet-btn');
        const newAssignmentNameInput = document.getElementById('new-assignment-name');
        const addAssignmentBtn = document.getElementById('add-assignment-btn');
        const resetBtn = document.getElementById('reset-btn');
        const undoBtn = document.getElementById('undo-btn');
        const redoBtn = document.getElementById('redo-btn');
        const sortBtn = document.getElementById('sort-btn');
        const tableHead = document.getElementById('table-head');
        const tableBody = document.getElementById('table-body');
        const tableFoot = document.getElementById('table-foot');
        const showStatusBtn = document.getElementById('show-status-btn');
        const exportCsvBtn = document.getElementById('export-csv-btn');
        const importCsvBtn = document.getElementById('import-csv-btn');
        const csvFileInput = document.getElementById('csv-file-input');
        const downloadCsvTemplateBtn = document.getElementById('download-csv-template-btn');
        const statusModal = document.getElementById('status-modal');
        const statusContent = document.getElementById('status-content');
        const closeStatusModalBtn = document.getElementById('close-status-modal-btn');
        const refreshStatusBtn = document.getElementById('refresh-status-btn');
        const toggleNamesBtn = document.getElementById('toggle-names-btn');
        const expandAllBtn = document.getElementById('expand-all-btn');
        const collapseAllBtn = document.getElementById('collapse-all-btn');
        const studentStatusModal = document.getElementById('student-status-modal');
        const studentStatusTitle = document.getElementById('student-status-title');
        const studentStatusSummary = document.getElementById('student-status-summary');
        const studentStatusContent = document.getElementById('student-status-content');
        const studentStatusCompletedSection = document.getElementById('student-status-completed-section');
        const closeStudentStatusModalBtn = document.getElementById('close-student-status-modal-btn');
        const refreshStudentStatusBtn = document.getElementById('refresh-student-status-btn');
        const oneClickCompleteBtn = document.getElementById('one-click-complete-btn');
        const prevStudentBtn = document.getElementById('prev-student-btn');
        const nextStudentBtn = document.getElementById('next-student-btn');
        const studentSelectDropdown = document.getElementById('student-select-dropdown');
        const undoStudentBtn = document.getElementById('undo-student-btn');
        const redoStudentBtn = document.getElementById('redo-student-btn');
        const confirmModal = document.getElementById('confirm-modal');
        const confirmModalText = document.getElementById('confirm-modal-text');
        const confirmDeleteBtn = document.getElementById('confirm-delete-btn');
        const cancelDeleteBtn = document.getElementById('cancel-delete-btn');
        const batchInputModal = document.getElementById('batch-input-modal');
        const batchInputTitle = document.getElementById('batch-input-title');
        const correctedInput = document.getElementById('corrected-input');
        const needsCorrectionInput = document.getElementById('needs-correction-input');
        const notSubmittedInput = document.getElementById('not-submitted-input');
        const missingSignatureInput = document.getElementById('missing-signature-input');
        const confirmBatchInputBtn = document.getElementById('confirm-batch-input-btn');
        const cancelBatchInputBtn = document.getElementById('cancel-batch-input-btn');
        const choiceModal = document.getElementById('choice-modal');
        const choiceModalButtons = document.getElementById('choice-modal-buttons');
        const cancelChoiceBtn = document.getElementById('cancel-choice-btn');
        const groupStatusModal = document.getElementById('group-status-modal');
        const groupStatusTitle = document.getElementById('group-status-title');
        const toggleGroupViewBtn = document.getElementById('toggle-group-view-btn');
        const groupSelectDropdown = document.getElementById('group-select-dropdown');
        const groupStatusContent = document.getElementById('group-status-content');
        const closeGroupStatusModalBtn = document.getElementById('close-group-status-modal-btn');


        // --- Helper Functions ---
        function autoCategorize(name) {
            if (/國|語|習作|生字|閱讀|圈詞|造句|作文/.test(name)) return '國語';
            if (/數|M習|M重/.test(name)) return '數學';
            if (/聯絡簿|聯絡本/.test(name)) return '聯絡簿';
            if (/音樂|音/.test(name)) return '音樂';
            return '其他';
        }

        function customGroupSort(a, b) {
            const groupSortOrder = {
                '一': 1, '二': 2, '三': 3, '四': 4, '五': 5,
                '六': 6, '七': 7, '八': 8, '九': 9, '十': 10
            };
            const valA = groupSortOrder[a];
            const valB = groupSortOrder[b];

            if (valA !== undefined && valB !== undefined) {
                return valA - valB;
            }
            if (valA !== undefined) return -1;
            if (valB !== undefined) return 1;

            return a.localeCompare(b, undefined, { numeric: true });
        }

        function updateHistoryButtonsState() {
            const canUndo = historyIndex > 0;
            const canRedo = historyIndex < history.length - 1;

            [undoBtn, undoStudentBtn].forEach(btn => {
                if (btn) {
                    btn.disabled = !canUndo;
                    btn.classList.toggle('opacity-50', !canUndo);
                    btn.classList.toggle('cursor-not-allowed', !canUndo);
                }
            });

            [redoBtn, redoStudentBtn].forEach(btn => {
                if (btn) {
                    btn.disabled = !canRedo;
                    btn.classList.toggle('opacity-50', !canRedo);
                    btn.classList.toggle('cursor-not-allowed', !canRedo);
                }
            });
        }
        
        function updateOpenSheetBtnState() {
            if (appState.sheetUrl && appState.sheetUrl.startsWith('http')) {
                openSheetBtn.href = appState.sheetUrl;
                openSheetBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-400');
                openSheetBtn.classList.add('bg-green-600', 'hover:bg-green-700');
                openSheetBtn.setAttribute('target', '_blank');
                openSheetBtn.title = "在新分頁中開啟 Google Sheet";
            } else {
                openSheetBtn.href = 'javascript:void(0)';
                openSheetBtn.classList.add('opacity-50', 'cursor-not-allowed');
                openSheetBtn.classList.remove('bg-green-600', 'hover:bg-green-700');
                openSheetBtn.classList.add('bg-gray-400');
                openSheetBtn.removeAttribute('target');
                openSheetBtn.title = "請在初始設定中提供有效的 Google Sheet 連結";
            }
        }

        // --- Data Persistence ---
        function recordState() {
            if (historyIndex < history.length - 1) {
                history.splice(historyIndex + 1);
            }
            history.push(JSON.stringify(appState));
            historyIndex++;
            if (history.length > 30) {
                history.shift();
                historyIndex--;
            }
            updateHistoryButtonsState();
        }

        function updateStateAndSave() {
            recordState();
            saveData();
        }

        function saveData() { 
            localStorage.setItem('homeworkTrackerData', JSON.stringify(appState)); 
        }
        
        function loadData() {
            const data = localStorage.getItem('homeworkTrackerData');
            if (data) {
                appState = JSON.parse(data);
                if (appState.students.length > 0) {
                    setupSection.classList.add('hidden');
                    mainSection.classList.remove('hidden');
                    updateOpenSheetBtnState();
                    history = [];
                    historyIndex = -1;
                    recordState();
                    renderTable();
                }
            }
            updateHistoryButtonsState();
        }

        // --- Core Rendering ---
        function renderTable() {
            tableHead.innerHTML = '';
            tableBody.innerHTML = '';
            tableFoot.innerHTML = '';
            if (appState.students.length === 0) return;
            
            const sortedStudents = [...appState.students];
            if (sortBy === 'group') {
                sortedStudents.sort((a, b) => {
                    const groupCompare = (a.group || '').localeCompare(b.group || '');
                    if (groupCompare !== 0) return groupCompare;
                    return parseInt(a.number, 10) - parseInt(b.number, 10);
                });
            } else { // default is 'number'
                sortedStudents.sort((a, b) => parseInt(a.number, 10) - parseInt(b.number, 10));
            }


            // --- 批次輸入列 ---
            const inputRow = document.createElement('tr');
            inputRow.innerHTML = `<th class="table-cell font-semibold sticky left-0 bg-gray-100 z-30" colspan="3">批次輸入</th>`;
            appState.assignments.forEach((assignment, index) => {
                const category = assignment.category || '其他';
                const colorClass = CATEGORY_COLORS[category] || '';
                const th = document.createElement('th');
                th.className = `table-cell bg-gray-100 ${colorClass}`;
                const inputBtn = document.createElement('button');
                inputBtn.textContent = '輸入';
                inputBtn.className = 'bg-slate-500 text-white py-1 px-3 rounded-md hover:bg-slate-600 text-xs font-semibold';
                inputBtn.addEventListener('click', () => handleShowBatchInput(index));
                th.appendChild(inputBtn);
                inputRow.appendChild(th);
            });

            // --- 作業標題列 ---
            const headerRow = document.createElement('tr');
            headerRow.innerHTML = `<th class="table-cell font-semibold sticky left-0 bg-gray-100 z-20 w-16">座號</th>
                                   <th class="table-cell font-semibold sticky left-[64px] bg-gray-100 z-20 w-32 border-l-0">姓名</th>
                                   <th class="table-cell font-semibold sticky left-[192px] bg-gray-100 z-20 w-16 border-l-0">組別</th>`;
            appState.assignments.forEach((assignment, index) => {
                const category = assignment.category || '其他';
                const colorClass = CATEGORY_COLORS[category] || '';
                const tagColorClass = CATEGORY_TAG_COLORS[category];

                const th = document.createElement('th');
                th.className = `header-cell font-semibold ${colorClass}`;
                
                const nameDiv = document.createElement('div');
                nameDiv.textContent = assignment.name;
                
                const dateDiv = document.createElement('div');
                dateDiv.className = 'text-xs font-normal text-gray-500';
                dateDiv.textContent = new Date(assignment.date).toLocaleDateString();

                const categoryTag = document.createElement('div');
                categoryTag.className = `category-tag ${tagColorClass}`;
                categoryTag.textContent = category;
                categoryTag.title = '點擊切換科目';
                categoryTag.addEventListener('click', (e) => {
                    e.stopPropagation(); // 避免觸發整欄變更
                    handleChangeCategory(index);
                });

                th.appendChild(nameDiv);
                th.appendChild(dateDiv);
                th.appendChild(categoryTag);
                th.addEventListener('click', () => handleColumnStatusChange(index));
                headerRow.appendChild(th);
            });
            tableHead.appendChild(inputRow);
            tableHead.appendChild(headerRow);

            // --- 學生資料列 ---
            sortedStudents.forEach((student) => {
                const studentIndex = appState.students.findIndex(s => s.id === student.id);
                const studentRow = document.createElement('tr');
                const rowIndex = sortedStudents.findIndex(s => s.id === student.id);
                studentRow.className = rowIndex % 2 === 0 ? 'bg-white' : 'bg-gray-50';

                const incompleteCount = appState.assignments.filter(a => ['未繳交', '待訂正', '缺簽名'].includes(student.statuses[a.id] || '未繳交')).length;
                
                studentRow.innerHTML += `<td class="table-cell font-medium sticky left-0 z-10 w-16 ${studentRow.className}">${student.number || ''}</td>`;
                
                const nameTd = document.createElement('td');
                nameTd.className = `table-cell font-medium sticky left-[64px] z-10 w-32 ${studentRow.className} border-l-0`;
                const nameButton = document.createElement('button');
                nameButton.className = 'text-indigo-600 hover:text-indigo-800 hover:underline focus:outline-none';
                nameButton.textContent = `${student.name} (${incompleteCount})`;
                nameButton.addEventListener('click', () => handleShowStudentStatus(studentIndex));
                nameTd.appendChild(nameButton);
                studentRow.appendChild(nameTd);

                const groupTd = document.createElement('td');
                groupTd.className = `table-cell font-medium sticky left-[192px] z-10 w-16 ${studentRow.className} border-l-0`;
                if (student.group) {
                    const groupBtn = document.createElement('button');
                    groupBtn.className = 'text-purple-600 hover:text-purple-800 hover:underline focus:outline-none font-semibold';
                    groupBtn.textContent = student.group;
                    groupBtn.onclick = () => handleShowGroupStatus(student.group);
                    groupTd.appendChild(groupBtn);
                }
                studentRow.appendChild(groupTd);

                appState.assignments.forEach((assignment, assignmentIndex) => {
                    const status = student.statuses[assignment.id] || '未繳交';
                    const category = assignment.category || '其他';
                    const colorClass = CATEGORY_COLORS[category] || '';
                    const td = document.createElement('td');
                    td.className = `table-cell ${colorClass}`;
                    const button = document.createElement('button');
                    button.textContent = status;
                    button.className = `status-btn ${STATUS_COLORS[status]}`;
                    button.addEventListener('click', () => handleStatusChange(studentIndex, assignmentIndex));
                    td.appendChild(button);
                    studentRow.appendChild(td);
                });
                tableBody.appendChild(studentRow);
            });
            
            // --- 刪除列 ---
            const footerRow = document.createElement('tr');
            footerRow.innerHTML = `<td class="table-cell font-semibold sticky left-0 bg-gray-100 z-10" colspan="3">刪除作業</td>`;
            appState.assignments.forEach((assignment, index) => {
                const category = assignment.category || '其他';
                const colorClass = CATEGORY_COLORS[category] || '';
                const td = document.createElement('td');
                td.className = `table-cell ${colorClass}`;
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '刪除';
                deleteBtn.className = 'bg-gray-400 text-white py-1 px-3 rounded hover:bg-gray-500 text-sm';
                deleteBtn.addEventListener('click', () => handleDeleteAssignment(index));
                td.appendChild(deleteBtn);

            tableFoot.appendChild(footerRow);
