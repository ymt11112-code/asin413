        // --- Event Handlers ---
        function handleStart() {
            const lines = studentListInput.value.trim().split('\n').filter(line => line.trim() !== '');
            if (lines.length === 0) { alert('請至少輸入一位學生！'); return; }
            appState.students = lines.map((line, index) => {
                const parts = line.trim().split(/\s+/);
                const number = parts.shift() || '?';
                const group = parts.pop() || '?';
                const name = parts.join(' ');
                return { id: index, number, name: name || '未命名', group, statuses: {} };
            });
            appState.sheetUrl = sheetUrlInput.value.trim();
            history = [];
            historyIndex = -1;
            updateStateAndSave();
            setupSection.classList.add('hidden');
            mainSection.classList.remove('hidden');
            updateOpenSheetBtnState();
            renderTable();
        }

        function handleAddAssignment() {
            const names = newAssignmentNameInput.value.trim().split(/[、\s]+/).filter(name => name);
            if (names.length === 0) { alert('請輸入作業名稱！'); return; }
            
            names.reverse().forEach((name, i) => {
                 const newAssignment = { 
                    id: Date.now() + i, 
                    name, 
                    date: new Date().toISOString(), 
                    category: autoCategorize(name) 
                };
                appState.assignments.unshift(newAssignment);
            });
            newAssignmentNameInput.value = '';
            updateStateAndSave();
            renderTable();
        }

        function handleChangeCategory(assignmentIndex) {
            const assignment = appState.assignments[assignmentIndex];
            const currentCategoryIndex = CATEGORIES.indexOf(assignment.category || '其他');
            const nextCategoryIndex = (currentCategoryIndex + 1) % CATEGORIES.length;
            assignment.category = CATEGORIES[nextCategoryIndex];
            updateStateAndSave();
            renderTable();
        }

        function handleStatusChange(studentIndex, assignmentIndex) {
            const student = appState.students[studentIndex];
            const assignmentId = appState.assignments[assignmentIndex].id;
            const currentStatus = student.statuses[assignmentId] || '未繳交';
            student.statuses[assignmentId] = STATUSES[(STATUSES.indexOf(currentStatus) + 1) % STATUSES.length];
            updateStateAndSave();
            renderTable();
        }
        
        function handleColumnStatusChange(assignmentIndex) {
            const HEADER_STATUSES = ['已繳交', '待訂正', '已訂正', '缺簽名', '未繳交'];
            const assignmentId = appState.assignments[assignmentIndex].id;
            const firstStatus = appState.students[0]?.statuses[assignmentId] || '未繳交';
            const allSame = appState.students.every(s => (s.statuses[assignmentId] || '未繳交') === firstStatus);
            let nextStatus = HEADER_STATUSES[0];
            if (allSame) {
                const currentIndex = HEADER_STATUSES.indexOf(firstStatus);
                nextStatus = HEADER_STATUSES[currentIndex === -1 || currentIndex === HEADER_STATUSES.length - 1 ? 0 : currentIndex + 1];
            }
            appState.students.forEach(student => student.statuses[assignmentId] = nextStatus);
            updateStateAndSave();
            renderTable();
        }

        function handleDeleteAssignment(assignmentIndex) {
            const assignmentName = appState.assignments[assignmentIndex].name;
            confirmModalText.textContent = `您確定要刪除「${assignmentName}」這項作業嗎？此操作無法復原。`;
            confirmModal.classList.remove('hidden');
            
            confirmDeleteBtn.onclick = () => {
                const assignmentIdToDelete = appState.assignments[assignmentIndex].id;
                appState.assignments.splice(assignmentIndex, 1);
                appState.students.forEach(student => { delete student.statuses[assignmentIdToDelete]; });
                updateStateAndSave();
                renderTable();
                confirmModal.classList.add('hidden');
            };
        }
        
        function handleReset() {
            confirmModalText.textContent = '您確定要刪除所有資料嗎？此操作無法復原！';
            confirmModal.classList.remove('hidden');
            confirmDeleteBtn.onclick = () => {
                localStorage.removeItem('homeworkTrackerData');
                appState = { students: [], assignments: [], sheetUrl: '' };
                history = [];
                historyIndex = -1;
                recordState();
                studentListInput.value = '';
                sheetUrlInput.value = '';
                mainSection.classList.add('hidden');
                setupSection.classList.remove('hidden');
                updateHistoryButtonsState();
                updateOpenSheetBtnState();
                renderTable();
                confirmModal.classList.add('hidden');
            };
        }

        function handleShowStatus() {
            statusContent.innerHTML = '';
            toggleNamesBtn.textContent = statusModalShowNames ? '隱藏姓名' : '顯示姓名';
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            if (appState.assignments.length === 0) {
                statusContent.innerHTML = `<p class="text-gray-500 col-span-full text-center">尚未新增任何作業。</p>`;
                statusModal.classList.remove('hidden');
                return;
            }

            const assignmentsByDate = appState.assignments.reduce((acc, assignment) => {
                const date = new Date(assignment.date);
                const dateString = `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
                if (!acc[dateString]) acc[dateString] = [];
                acc[dateString].push(assignment);
                return acc;
            }, {});

            const sortedDates = Object.keys(assignmentsByDate).sort((a, b) => new Date(b) - new Date(a));
            let hasAnyIncompleteOverall = false;

            sortedDates.forEach(dateString => {
                const assignmentsForDate = assignmentsByDate[dateString];
                const date = new Date(dateString);
                const displayDate = `${(date.getMonth() + 1)}/${date.getDate()}(${weekDays[date.getDay()]})`;
                
                let hasIncompleteForDate = false;

                const allAssignmentsWithDetails = assignmentsForDate.map(assignment => {
                    const statusGroups = { '未繳交': [], '待訂正': [], '缺簽名': [] };
                     appState.students.forEach(student => {
                        const status = student.statuses[assignment.id] || '未繳交';
                        if (status in statusGroups) statusGroups[status].push(student);
                    });
                    const hasAnyIncomplete = Object.values(statusGroups).some(g => g.length > 0);
                    if (hasAnyIncomplete) {
                        hasAnyIncompleteOverall = true;
                        hasIncompleteForDate = true;
                    }
                    return { assignment, statusGroups, hasAnyIncomplete };
                }).sort((a, b) => {
                    if (a.hasAnyIncomplete === b.hasAnyIncomplete) return 0;
                    return a.hasAnyIncomplete ? -1 : 1;
                });
                
                const incompleteAssignmentsWithDetails = allAssignmentsWithDetails.filter(item => item.hasAnyIncomplete);

                let summaryText = '';
                if (hasIncompleteForDate) {
                     summaryText = incompleteAssignmentsWithDetails
                        .map(item => {
                            const incompleteCount = item.statusGroups['待訂正'].length + item.statusGroups['未繳交'].length + item.statusGroups['缺簽名'].length;
                            return `${item.assignment.name}(${incompleteCount})`;
                        })
                        .join('、 ');
                } else {
                    summaryText = '<span class="text-green-600 font-semibold">全部完成</span>';
                }

                const contentId = `content-${dateString.replace(/\//g, '-')}`;
                let cardHTML = `
                <div class="bg-white rounded-lg shadow-sm">
                    <button class="w-full text-left flex justify-between items-center p-4" ${!hasIncompleteForDate ? 'disabled' : ''} data-toggle-id="${contentId}">
                        <div class="flex-grow">
                            <div class="flex items-baseline gap-x-4">
                                <h3 class="text-xl font-bold text-indigo-700 flex-shrink-0">${displayDate}</h3>
                                <div class="text-sm text-gray-600 text-left">${summaryText}</div>
                            </div>
                        </div>
                        ${hasIncompleteForDate ? `<svg class="w-6 h-6 transform transition-transform flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>` : ''}
                    </button>
                    <div id="${contentId}" class="collapsible-content">
                        <div class="px-4 pb-4">`;

                if (hasIncompleteForDate) {
                    const columnsToShow = { '待訂正': false, '未繳交': false, '缺簽名': false };
                    allAssignmentsWithDetails.forEach(item => {
                        if (item.statusGroups['待訂正'].length > 0) columnsToShow['待訂正'] = true;
                        if (item.statusGroups['未繳交'].length > 0) columnsToShow['未繳交'] = true;
                        if (item.statusGroups['缺簽名'].length > 0) columnsToShow['缺簽名'] = true;
                    });
                    
                    let tableHeaderHTML = `<tr>
                        <th class="py-2 px-2 w-12 font-semibold border-b-2 border-gray-300 text-center">編號</th>
                        <th class="py-2 px-2 w-32 font-semibold border-b-2 border-gray-300">作業</th>`;
                    if(columnsToShow['待訂正']) tableHeaderHTML += `<th class="py-2 px-2 font-semibold text-yellow-600 border-b-2 border-yellow-200">待訂正</th>`;
                    if(columnsToShow['未繳交']) tableHeaderHTML += `<th class="py-2 px-2 font-semibold text-red-600 border-b-2 border-red-200">未繳交</th>`;
                    if(columnsToShow['缺簽名']) tableHeaderHTML += `<th class="py-2 px-2 font-semibold text-purple-600 border-b-2 border-purple-200">缺簽名</th>`;
                    tableHeaderHTML += `</tr>`;

                    let tableBodyHTML = '';
                    allAssignmentsWithDetails.forEach((item, index) => {
                         const studentListHTML = (status) => {
                            const students = item.statusGroups[status];
                            if (students.length === 0) return '<span class="text-gray-400">-</span>';
                            if (!statusModalShowNames) {
                                const studentNumbers = students.map(s => s.number).join('、');
                                return `${students.length}人<br><span class="text-xs text-gray-500">(${studentNumbers})</span>`;
                            }
                            return students.map(s => `${s.number}-${s.name}`).join('、 ');
                        };
                        
                        if(item.hasAnyIncomplete) {
                            tableBodyHTML += `<tr class="border-t">
                                <td class="p-2 text-center font-semibold text-gray-600">${index + 1}</td>
                                <td class="p-2 text-left font-semibold text-gray-800">${item.assignment.name}</td>`;
                            if(columnsToShow['待訂正']) tableBodyHTML += `<td class="p-2 text-left text-gray-700 leading-relaxed">${studentListHTML('待訂正')}</td>`;
                            if(columnsToShow['未繳交']) tableBodyHTML += `<td class="p-2 text-left text-gray-700 leading-relaxed">${studentListHTML('未繳交')}</td>`;
                            if(columnsToShow['缺簽名']) tableBodyHTML += `<td class="p-2 text-left text-gray-700 leading-relaxed">${studentListHTML('缺簽名')}</td>`;
                            tableBodyHTML += `</tr>`;
                        } else {
                            const colCount = Object.values(columnsToShow).filter(Boolean).length + 1;
                            tableBodyHTML += `<tr class="border-t bg-green-50 opacity-60">
                                <td class="p-2 text-center font-semibold text-gray-500">${index + 1}</td>
                                <td class="p-2 text-left font-semibold text-gray-700">${item.assignment.name}</td>
                                <td colspan="${colCount}" class="p-2 text-center text-green-700 font-semibold">全部完成 ✔</td>
                            </tr>`;
                        }
                    });
                    
                    cardHTML += `<div class="overflow-x-auto">
                                <table class="w-full text-sm border-collapse table-fixed">
                                    <thead class="text-left bg-white">${tableHeaderHTML}</thead>
                                    <tbody>${tableBodyHTML}</tbody>
                                </table>
                            </div>`;
                }
                cardHTML += `</div></div></div>`;
                statusContent.innerHTML += cardHTML;
            });

            if (!hasAnyIncompleteOverall) {
                statusContent.innerHTML = `<p class="text-green-600 font-semibold col-span-full text-center text-lg">太棒了！所有作業都已完成！</p>`;
            }
            statusModal.classList.remove('hidden');

            // Default expansion for the first day
            const firstCollapsible = statusContent.querySelector('.collapsible-content');
            if(firstCollapsible) {
                const firstButton = statusContent.querySelector(`[data-toggle-id="${firstCollapsible.id}"]`);
                if (firstButton && !firstButton.disabled) {
                    toggleCollapsible(firstCollapsible, firstButton);
                }
            }
        }
        
        const renderInteractiveList = (assignments, status) => {
            if (assignments.length === 0) return '<div class="text-gray-400 text-sm">無</div>';
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

            const grouped = assignments.reduce((acc, assignment) => {
                const originalName = assignment.name;
                const category = assignment.category;

                if (category === '聯絡簿') {
                    const base = '聯絡簿';
                    if (!acc[base]) acc[base] = [];
                    acc[base].push(assignment);
                } else {
                    const match = originalName.match(/^([\u4e00-\u9fa5]+)/);
                    let base = match ? match[0] : originalName.split(/[0-9LP]/)[0] || originalName;
                    
                    if (base === "M習") base = "數習";
                    if (base === "M重") base = "數重";

                    if (!acc[base]) acc[base] = [];
                    acc[base].push(assignment);
                }
                return acc;
            }, {});

            let html = '';
            let counter = 1;
            for (const baseName in grouped) {
                const groupedAssignments = grouped[baseName];
                
                const partsHTML = groupedAssignments.map(assignment => {
                    let partName;
                    if (baseName === '聯絡簿') {
                        const date = new Date(assignment.date);
                        partName = `(${date.getMonth() + 1}/${date.getDate()}(${weekDays[date.getDay()]}))`;
                    } else {
                        partName = assignment.name.substring(baseName.length).trim() || assignment.name;
                    }
                    return `<button class="interactive-status-item" data-assignment-ids="${assignment.id}" data-current-status="${status}">${partName}</button>`;
                }).join('');

                html += `<div class="py-1 flex items-start">
                            <span class="font-semibold text-gray-500 pt-1">${counter++}.</span>
                            <div class="pl-2">
                                <span class="font-semibold pt-1">${baseName}：</span>
                                ${partsHTML}
                            </div>
                         </div>`;
            }
            return html;
        };

        function handleShowStudentStatus(studentIndex) {
            studentStatusModal.dataset.studentIndex = studentIndex;
            const student = appState.students[studentIndex];
            studentStatusTitle.textContent = `${student.number} ${student.name} 的作業狀態`;
            
            studentSelectDropdown.innerHTML = '';
            appState.students.forEach((s, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${s.number} ${s.name}`;
                studentSelectDropdown.appendChild(option);
            });
            studentSelectDropdown.value = studentIndex;

            const incompleteStatuses = ['未繳交', '待訂正', '缺簽名'];
            const completedStatuses = ['已訂正', '已繳交'];
            
            const incompleteAssignments = appState.assignments.filter(assignment => incompleteStatuses.includes(student.statuses[assignment.id] || '未繳交'));
            const completedAssignments = appState.assignments.filter(assignment => completedStatuses.includes(student.statuses[assignment.id]));
            const incompleteCount = incompleteAssignments.length;

            const statusGroups = { '待訂正': [], '未繳交': [], '缺簽名': [] };
            const categoryCounts = { '國語': 0, '數學': 0, '聯絡簿': 0, '音樂': 0, '其他': 0 };

            incompleteAssignments.forEach(assignment => {
                const status = student.statuses[assignment.id];
                if(status in statusGroups) statusGroups[status].push(assignment);
                const category = assignment.category || '其他';
                categoryCounts[category]++;
            });
            
            let summaryText = `共 ${incompleteCount} 項作業尚未完成`;
            const categoriesWithCounts = CATEGORIES.map(cat => ({ name: cat, count: categoryCounts[cat] }))
                .filter(c => c.count > 0)
                .map(c => `${c.name}(${c.count})`)
                .join('、 ');
            if (categoriesWithCounts) {
                summaryText += `： ${categoriesWithCounts}`;
            }

            let categorizedListHeaderHTML = '';
            let categorizedListBodyHTML = '';
            ['待訂正', '未繳交', '缺簽名'].forEach(status => {
                if (statusGroups[status].length > 0) {
                    const colorMap = { '待訂正': 'yellow', '未繳交': 'red', '缺簽名': 'purple' };
                    categorizedListHeaderHTML += `<th class="py-2 px-2 font-semibold text-${colorMap[status]}-600 border-b-2 border-${colorMap[status]}-200">${status} (${statusGroups[status].length})</th>`;
                    categorizedListBodyHTML += `<td class="p-2 align-top text-gray-700 leading-relaxed">${renderInteractiveList(statusGroups[status], status)}</td>`;
                }
            });
            
            let categorizedListHTML = `<div class="mb-6">
                <table class="w-full text-sm border-collapse table-fixed">
                    <thead class="text-left"><tr>${categorizedListHeaderHTML}</tr></thead>
                    <tbody><tr>${categorizedListBodyHTML}</tr></tbody>
                </table>
            </div>`;
            
            if (incompleteCount > 0) {
                studentStatusSummary.textContent = summaryText;
                studentStatusSummary.className = 'bg-red-100 border border-red-300 text-red-800 text-center p-3 rounded-md mb-6';
                studentStatusContent.innerHTML = categorizedListHTML;
            } else {
                studentStatusSummary.textContent = '所有作業皆已完成！';
                studentStatusSummary.className = 'bg-green-100 border border-green-300 text-green-800 text-center p-3 rounded-md mb-6';
                studentStatusContent.innerHTML = '';
            }
            
            // Render completed section
            let completedHTML = '';
            const correctedAssignments = completedAssignments.filter(a => student.statuses[a.id] === '已訂正');
            const submittedAssignments = completedAssignments.filter(a => student.statuses[a.id] === '已繳交');

            if (correctedAssignments.length > 0) {
                completedHTML += `<h3 class="text-lg font-semibold text-blue-600 mb-2">已訂正</h3><div>${renderInteractiveList(correctedAssignments, '已訂正')}</div>`;
            }
             if (submittedAssignments.length > 0) {
                completedHTML += `<h3 class="text-lg font-semibold text-green-600 mt-4 mb-2">已繳交</h3><div>${renderInteractiveList(submittedAssignments, '已繳交')}</div>`;
            }
            studentStatusCompletedSection.innerHTML = completedHTML;

            studentStatusModal.classList.remove('hidden');
        }
        
        function handleShowGroupStatus(group) {
            groupView = 'individual'; // Reset view when opening
            const mainGroup = group ? group[0] : null;
            if (!mainGroup) return;

            const uniqueMainGroups = [...new Set(appState.students.map(s => s.group ? s.group[0] : null).filter(g => g && g !== '?'))].sort(customGroupSort);
            
            groupSelectDropdown.innerHTML = '';
            uniqueMainGroups.forEach(g => {
                const option = document.createElement('option');
                option.value = g;
                option.textContent = `第 ${g} 組`;
                groupSelectDropdown.appendChild(option);
            });
            groupSelectDropdown.value = mainGroup;
            
            renderGroupStatusTable(mainGroup);
            groupStatusModal.classList.remove('hidden');
        }

        function renderGroupStatusTable(mainGroup) {
            if (groupView === 'all') {
                groupStatusTitle.textContent = '全組作業概況';
                toggleGroupViewBtn.textContent = '切換為各組檢視';
                toggleGroupViewBtn.className = 'py-2 px-4 rounded-md text-sm font-semibold bg-purple-500 text-white hover:bg-purple-600';
                groupSelectDropdown.classList.add('hidden');
            } else {
                groupStatusTitle.textContent = '各組作業概況';
                toggleGroupViewBtn.textContent = '切換為全組概況';
                toggleGroupViewBtn.className = 'py-2 px-4 rounded-md text-sm font-semibold bg-indigo-500 text-white hover:bg-indigo-600';
                groupSelectDropdown.classList.remove('hidden');
            }

            groupStatusContent.innerHTML = '';

            const assignmentsByDate = appState.assignments.reduce((acc, assignment) => {
                const date = new Date(assignment.date);
                const dateString = `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
                if (!acc[dateString]) acc[dateString] = [];
                acc[dateString].push(assignment);
                return acc;
            }, {});

            const sortedDates = Object.keys(assignmentsByDate).sort((a, b) => new Date(b) - new Date(a));
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

            if (groupView === 'all') {
                const uniqueMainGroups = [...new Set(appState.students.map(s => s.group ? s.group[0] : null).filter(g => g && g !== '?'))].sort(customGroupSort);

                sortedDates.forEach(dateString => {
                    const assignmentsForDate = assignmentsByDate[dateString];
                    const date = new Date(dateString);
                    const displayDate = `${(date.getMonth() + 1)}/${date.getDate()}(${weekDays[date.getDay()]})`;

                    let tableHeaderHTML = `<thead><tr class="bg-gray-200">
                        <th class="table-cell font-semibold">作業項目</th>
                        ${uniqueMainGroups.map(g => `<th class="table-cell font-semibold">第 ${g} 組</th>`).join('')}
                    </tr></thead>`;

                    let tableBodyHTML = '<tbody>';
                    assignmentsForDate.forEach(assignment => {
                        const category = assignment.category || '其他';
                        const colorClass = CATEGORY_COLORS[category] || '';
                        tableBodyHTML += `<tr class="border-t ${colorClass}"><td class="table-cell text-left font-semibold">${assignment.name}</td>`;
                        uniqueMainGroups.forEach(g => {
                            const groupStudents = appState.students.filter(s => s.group && s.group[0] === g);
                            if (groupStudents.length === 0) {
                                tableBodyHTML += `<td class="table-cell">-</td>`;
                                return;
                            }
                            const incompleteStudents = groupStudents.filter(student => {
                                const status = student.statuses[assignment.id] || '未繳交';
                                return ['未繳交', '待訂正', '缺簽名'].includes(status);
                            });

                            if (incompleteStudents.length === 0) {
                                tableBodyHTML += `<td class="table-cell text-center text-green-600 font-bold">OK</td>`;
                            } else {
                                const numbers = incompleteStudents.map(s => s.number).join(',');
                                tableBodyHTML += `<td class="table-cell text-center text-red-600" title="${incompleteStudents.map(s=>s.name).join(', ')}">${numbers}</td>`;
                            }
                        });
                        tableBodyHTML += '</tr>';
                    });
                    tableBodyHTML += '</tbody>';
                    
                    const cardHTML = `<div class="bg-white rounded-lg shadow-sm mb-4">
                        <div class="p-4 border-b bg-gray-50"><h3 class="text-xl font-bold text-indigo-700">${displayDate}</h3></div>
                        <div class="overflow-x-auto"><table class="w-full text-sm border-collapse">${tableHeaderHTML}${tableBodyHTML}</table></div>
                    </div>`;
                    groupStatusContent.innerHTML += cardHTML;
                });

            } else { // Individual View
                const groupStudents = appState.students.filter(s => s.group && s.group[0] === mainGroup).sort((a,b) => (a.group.slice(-1)).localeCompare(b.group.slice(-1)));
                if (groupStudents.length === 0) {
                    groupStatusContent.innerHTML = `<p class="text-gray-500 text-center">該組別沒有學生。</p>`;
                    return;
                };

                sortedDates.forEach(dateString => {
                    const assignmentsForDate = assignmentsByDate[dateString];
                    const date = new Date(dateString);
                    const displayDate = `${(date.getMonth() + 1)}/${date.getDate()}(${weekDays[date.getDay()]})`;
                    
                    let hasIncompleteForDate = false;
                    const incompleteSummary = [];

                    assignmentsForDate.forEach(assignment => {
                        const incompleteStudents = groupStudents.filter(student => {
                            const status = student.statuses[assignment.id] || '未繳交';
                            return ['未繳交', '待訂正', '缺簽名'].includes(status);
                        });
                        if (incompleteStudents.length > 0) {
                            hasIncompleteForDate = true;
                            const studentNumbers = incompleteStudents.map(s => s.number).join(',');
                            incompleteSummary.push(`${assignment.name}(${studentNumbers})`);
                        }
                    });
                    
                    let summaryText = hasIncompleteForDate 
                        ? incompleteSummary.join('、 ') 
                        : '<span class="text-green-600 font-semibold">全部完成</span>';
                    
                    let tableHTML = `<table class="w-full text-sm border-collapse">
                                    <thead>
                                        <tr class="bg-gray-200">
                                            <th class="table-cell font-semibold">作業項目</th>
                                            ${groupStudents.map(s => `<th class="table-cell font-semibold">${s.group}<br>${s.name}</th>`).join('')}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${assignmentsForDate.map(assignment => {
                                            const category = assignment.category || '其他';
                                            const colorClass = CATEGORY_COLORS[category] || '';
                                            return `<tr class="border-t ${colorClass}">
                                                <td class="table-cell text-left">
                                                    <button class="font-semibold text-blue-600 hover:underline" data-assignment-id="${assignment.id}" data-group="${mainGroup}">${assignment.name}</button>
                                                </td>
                                                ${groupStudents.map(student => {
                                                    const status = student.statuses[assignment.id] || '未繳交';
                                                    const studentIndex = appState.students.findIndex(s => s.id === student.id);
                                                    const assignmentIndex = appState.assignments.findIndex(a => a.id === assignment.id);
                                                    return `<td class="table-cell">
                                                        <button class="status-btn w-auto px-2 py-1 text-xs ${STATUS_COLORS[status]}" data-student-index="${studentIndex}" data-assignment-index="${assignmentIndex}">${status}</button>
                                                    </td>`;
                                                }).join('')}
                                            </tr>`;
                                        }).join('')}
                                    </tbody>
                                </table>`;

                    let cardHTML = `
                    <div class="bg-gray-100 rounded-lg shadow-sm mb-4">
                        <div class="w-full text-left p-4 border-b">
                            <h3 class="text-lg font-bold text-indigo-700 flex-shrink-0">${displayDate}</h3>
                            <div class="text-sm text-gray-600 text-left mt-1">${summaryText}</div>
                        </div>
                        <div class="px-4 pb-4 overflow-x-auto">
                           ${tableHTML}
                        </div>
                    </div>`;
                    groupStatusContent.innerHTML += cardHTML;
                });
            }
        }

        function handleShowBatchInput(assignmentIndex) {
            const assignment = appState.assignments[assignmentIndex];
            batchInputTitle.textContent = `批次輸入：${assignment.name}`;
            correctedInput.value = '';
            needsCorrectionInput.value = '';
            notSubmittedInput.value = '';
            missingSignatureInput.value = '';
            batchInputModal.dataset.assignmentIndex = assignmentIndex;
            batchInputModal.classList.remove('hidden');
        }

        function handleProcessBatchInput() {
            const assignmentIndex = parseInt(batchInputModal.dataset.assignmentIndex, 10);
            if (isNaN(assignmentIndex)) return;
            const assignmentId = appState.assignments[assignmentIndex].id;

            const inputs = {
                '已訂正': correctedInput.value,
                '待訂正': needsCorrectionInput.value,
                '未繳交': notSubmittedInput.value,
                '缺簽名': missingSignatureInput.value,
            };

            for (const status in inputs) {
                const numbers = (inputs[status].match(/\d+/g) || []);
                numbers.forEach(numStr => {
                    const student = appState.students.find(s => s.number === numStr);
                    if (student) {
                        student.statuses[assignmentId] = status;
                    }
                });
            }

            updateStateAndSave();
            renderTable();
            closeModal(batchInputModal);
        }

        function handleDownloadCsvTemplate() {
            const headers = ['座號', '姓名', '組別'];
            const exampleRow1 = ['1', '王小明', '1A'];
            const exampleRow2 = ['2', '陳大華', '1B'];
            let csvContent = "\uFEFF"; // BOM for UTF-8 for Excel compatibility
            csvContent += headers.join(',') + '\r\n';
            csvContent += exampleRow1.join(',') + '\r\n';
            csvContent += exampleRow2.join(',') + '\r\n';

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "學生名單範本.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function handleExportCSV() {
            if (appState.students.length === 0) { alert("沒有資料可以匯出。"); return; }
            const headers = ['座號', '姓名', '組別', ...appState.assignments.map(a => a.name)];
            const dates = ['', '', '', ...appState.assignments.map(a => a.date)];
            const categories = ['', '', '', ...appState.assignments.map(a => a.category || '其他')];
            const rows = appState.students.map(student => {
                const studentRow = [student.number, student.name, student.group];
                appState.assignments.forEach(assignment => { studentRow.push(student.statuses[assignment.id] || '未繳交'); });
                return studentRow;
            });
            let csvContent = "\uFEFF"; // BOM for UTF-8
            csvContent += headers.join(',') + '\r\n';
            csvContent += dates.join(',') + '\r\n';
            csvContent += categories.join(',') + '\r\n';
            rows.forEach(rowArray => { csvContent += rowArray.join(',') + '\r\n'; });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            link.setAttribute("href", url);
            link.setAttribute("download", "作業清點資料.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function handleImportCSV(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const lines = text.trim().split(/\r\n|\n/).filter(line => line.trim() !== '');
                if (lines.length < 1) { alert("CSV 檔案是空的。"); return; }
                
                const headers = lines[0].split(',').map(h => h.trim());

                if (headers.length === 3 && headers.includes('座號') && headers.includes('姓名') && headers.includes('組別')) {
                    confirmModalText.textContent = '偵測到學生名單檔案。這將會覆蓋現有的學生名單並重設作業，確定要匯入嗎？';
                    confirmModal.classList.remove('hidden');
                    confirmDeleteBtn.onclick = () => {
                        try {
                            const studentLines = lines.slice(1);
                            const newStudents = studentLines.map((line, index) => {
                                const values = line.split(',');
                                return { id: index, number: values[0]?.trim() || '?', name: values[1]?.trim() || '未命名', group: values[2]?.trim() || '?', statuses: {} };
                            });
                            if (newStudents.length === 0) {
                                alert("CSV檔案中沒有找到學生資料。");
                                return;
                            }
                            appState.students = newStudents;
                            appState.assignments = [];
                            appState.sheetUrl = sheetUrlInput.value.trim();
                            history = [];
                            historyIndex = -1;
                            updateStateAndSave();
                            setupSection.classList.add('hidden');
                            mainSection.classList.remove('hidden');
                            updateOpenSheetBtnState();
                            renderTable();
                            alert("學生名單匯入成功！");
                        } catch (error) {
                            alert("讀取學生名單時發生錯誤。");
                            console.error(error);
                        } finally {
                            confirmModal.classList.add('hidden');
                            csvFileInput.value = '';
                        }
                    };
                } else {
                    if (lines.length < 4) { alert("完整資料備份的 CSV 檔案格式不正確 (至少需要四行)。"); return; }
                    confirmModalText.textContent = '匯入完整備份將會覆蓋所有現有資料，確定要繼續嗎？';
                    confirmModal.classList.remove('hidden');
                    confirmDeleteBtn.onclick = () => {
                        try {
                            lines.shift();
                            const dates = lines.shift().split(',');
                            const categories = lines.shift().split(',');
                            const newAssignments = headers.slice(3).map((name, index) => ({ 
                                id: Date.now() + Math.random() + index,
                                name: name.trim(), 
                                date: dates[index + 3]?.trim() || new Date().toISOString(),
                                category: categories[index + 3]?.trim() || autoCategorize(name.trim())
                            }));
                            const studentLines = lines;
                            const newStudents = studentLines.map((line, index) => {
                                const values = line.split(',');
                                const statuses = {};
                                newAssignments.forEach((assignment, i) => {
                                    const status = values[i + 3]?.trim();
                                    if (STATUSES.includes(status)) { statuses[assignment.id] = status; }
                                });
                                return { id: index, number: values[0]?.trim(), name: values[1]?.trim(), group: values[2]?.trim(), statuses: statuses };
                            });
                            appState.students = newStudents;
                            appState.assignments = newAssignments;
                            appState.sheetUrl = sheetUrlInput.value.trim();
                            history = [];
                            historyIndex = -1;
                            updateStateAndSave();
                            setupSection.classList.add('hidden');
                            mainSection.classList.remove('hidden');
                            updateOpenSheetBtnState();
                            renderTable();
                            alert("資料還原成功！");
                        } catch (error) {
                            alert("讀取備份檔案時發生錯誤，請檢查檔案格式是否正確。");
                            console.error(error);
                        } finally {
                            confirmModal.classList.add('hidden');
                            csvFileInput.value = '';
                        }
                    };
                }
            };
            reader.readAsText(file, 'UTF-8');
        }
        
        function updateStatusAndRefresh(assignmentIds, newStatus, studentIndex) {
            const student = appState.students[studentIndex];
            assignmentIds.forEach(id => {
                const assignment = appState.assignments.find(a => a.id == id);
                if(assignment) student.statuses[assignment.id] = newStatus;
            });
            updateStateAndSave();
            renderTable();
            handleShowStudentStatus(studentIndex);
            closeModal(choiceModal);
        }

        function showChoiceModal(choices, assignmentIds, studentIndex) {
            choiceModalButtons.innerHTML = '';
            choices.forEach(choice => {
                const button = document.createElement('button');
                button.textContent = choice;
                button.className = `py-2 px-4 rounded-md font-semibold ${STATUS_COLORS[choice] || 'bg-gray-500'}`;
                button.onclick = () => updateStatusAndRefresh(assignmentIds, choice, studentIndex);
                choiceModalButtons.appendChild(button);
            });
            choiceModal.classList.remove('hidden');
        }

        function handleInteractiveStatusChange(event) {
            const button = event.target.closest('.interactive-status-item');
            if (!button) return;

            const studentIndex = parseInt(studentStatusModal.dataset.studentIndex, 10);
            const assignmentIds = button.dataset.assignmentIds.split(',');
            const currentStatus = button.dataset.currentStatus;

            if (currentStatus === '未繳交') {
                showChoiceModal(['待訂正', '已繳交'], assignmentIds, studentIndex);
                return;
            }
            if (currentStatus === '已繳交') {
                showChoiceModal(['未繳交', '待訂正', '缺簽名'], assignmentIds, studentIndex);
                return;
            }
            if (currentStatus === '待訂正') {
                showChoiceModal(['已訂正', '缺簽名'], assignmentIds, studentIndex);
                return;
            }
            if (currentStatus === '已訂正') {
                showChoiceModal(['待訂正', '缺簽名'], assignmentIds, studentIndex);
                return;
            }

            const nextStatusMap = {
                '缺簽名': '已繳交',
            };

            const nextStatus = nextStatusMap[currentStatus];
            if (!nextStatus) return;
            
            updateStatusAndRefresh(assignmentIds, nextStatus, studentIndex);
        }
        
        function handleOneClickComplete() {
            const studentIndex = parseInt(studentStatusModal.dataset.studentIndex, 10);
            const student = appState.students[studentIndex];
            if (!student) return;
            
            appState.assignments.forEach(assignment => {
                const currentStatus = student.statuses[assignment.id] || '未繳交';
                if (currentStatus === '待訂正') {
                    student.statuses[assignment.id] = '已訂正';
                } else if (currentStatus === '未繳交' || currentStatus === '缺簽名') {
                    student.statuses[assignment.id] = '已繳交';
                }
            });

            updateStateAndSave();
            renderTable();
            handleShowStudentStatus(studentIndex);
        }

        function navigateStudent(direction) {
            let currentIndex = parseInt(studentStatusModal.dataset.studentIndex, 10);
            const studentCount = appState.students.length;
            let newIndex = (currentIndex + direction + studentCount) % studentCount;
            handleShowStudentStatus(newIndex);
        }
        
        function handleUndo() {
            if (historyIndex > 0) {
                historyIndex--;
                appState = JSON.parse(history[historyIndex]);
                saveData(); // Save the restored state to localStorage
                renderTable();
                updateHistoryButtonsState();

                if (!studentStatusModal.classList.contains('hidden')) {
                    const studentIndex = parseInt(studentStatusModal.dataset.studentIndex, 10);
                    if (!isNaN(studentIndex)) {
                        handleShowStudentStatus(studentIndex);
                    }
                }
            }
        }
        
        function handleRedo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                appState = JSON.parse(history[historyIndex]);
                saveData();
                renderTable();
                updateHistoryButtonsState();
                
                if (!studentStatusModal.classList.contains('hidden')) {
                    const studentIndex = parseInt(studentStatusModal.dataset.studentIndex, 10);
                    if (!isNaN(studentIndex)) {
                        handleShowStudentStatus(studentIndex);
                    }
                }
            }
        }

        function handleSortToggle() {
            if (sortBy === 'number') {
                sortBy = 'group';
                sortBtn.textContent = '依座號排列';
            } else {
                sortBy = 'number';
                sortBtn.textContent = '依組別排列';
            }
            renderTable();
        }


        function toggleCollapsible(content, button) {
            const icon = button.querySelector('svg');
            if (content.style.maxHeight && content.style.maxHeight !== '0px') {
                content.style.maxHeight = '0px';
                icon?.classList.remove('rotate-180');
            } else {
                content.style.maxHeight = content.scrollHeight + "px";
                icon?.classList.add('rotate-180');
            }
        }

        function handleToggleAll(expand, container) {
            container.querySelectorAll('.collapsible-content').forEach(content => {
                const button = container.querySelector(`[data-toggle-id="${content.id}"]`);
                const icon = button?.querySelector('svg');
                if (expand) {
                    if (button && !button.disabled) {
                        content.style.maxHeight = content.scrollHeight + "px";
                        icon?.classList.add('rotate-180');
                    }
                } else {
                    content.style.maxHeight = '0px';
                    icon?.classList.remove('rotate-180');
                }
            });
        }
        
        function handleGroupTableClick(event) {
            const studentBtn = event.target.closest('button[data-student-index]');
            const assignmentBtn = event.target.closest('button[data-assignment-id][data-group]');

            if (studentBtn) {
                const studentIndex = parseInt(studentBtn.dataset.studentIndex, 10);
                const assignmentIndex = parseInt(studentBtn.dataset.assignmentIndex, 10);
                handleStatusChange(studentIndex, assignmentIndex);
                renderGroupStatusTable(groupSelectDropdown.value);
            } else if (assignmentBtn) {
                const assignmentId = assignmentBtn.dataset.assignmentId;
                const mainGroup = assignmentBtn.dataset.group;
                const groupStudents = appState.students.filter(s => s.group && s.group[0] === mainGroup);
                
                const HEADER_STATUSES = ['已繳交', '待訂正', '已訂正', '缺簽名', '未繳交'];
                const firstStatus = groupStudents[0]?.statuses[assignmentId] || '未繳交';
                const allSame = groupStudents.every(s => (s.statuses[assignmentId] || '未繳交') === firstStatus);
                
                let nextStatus = HEADER_STATUSES[0];
                if (allSame) {
                    const currentIndex = HEADER_STATUSES.indexOf(firstStatus);
                    nextStatus = HEADER_STATUSES[currentIndex === -1 || currentIndex === HEADER_STATUSES.length - 1 ? 0 : currentIndex + 1];
                }
                
                groupStudents.forEach(student => {
                    student.statuses[assignmentId] = nextStatus;
                });
                
                updateStateAndSave();
                renderGroupStatusTable(mainGroup);
                renderTable();
            }
        }

        // --- Init & Event Listeners ---
        function closeModal(modal) { modal.classList.add('hidden'); }
        
        const eventMap = {
            'start-btn': handleStart,
            'add-assignment-btn': handleAddAssignment,
            'reset-btn': handleReset,
            'show-status-btn': handleShowStatus,
            'export-csv-btn': handleExportCSV,
            'import-csv-btn': () => csvFileInput.click(),
            'download-csv-template-btn': handleDownloadCsvTemplate,
            'close-status-modal-btn': () => closeModal(statusModal),
            'close-student-status-modal-btn': () => closeModal(studentStatusModal),
            'close-group-status-modal-btn': () => closeModal(groupStatusModal),
            'cancel-delete-btn': () => closeModal(confirmModal),
            'cancel-choice-btn': () => closeModal(choiceModal),
            'refresh-status-btn': handleShowStatus,
            'refresh-student-status-btn': () => {
                const index = studentStatusModal.dataset.studentIndex;
                if (index !== undefined) { handleShowStudentStatus(parseInt(index, 10)); }
            },
            'toggle-names-btn': () => {
                statusModalShowNames = !statusModalShowNames;
                handleShowStatus();
            },
            'confirm-batch-input-btn': handleProcessBatchInput,
            'cancel-batch-input-btn': () => closeModal(batchInputModal),
            'expand-all-btn': () => handleToggleAll(true, statusContent),
            'collapse-all-btn': () => handleToggleAll(false, statusContent),
            'one-click-complete-btn': handleOneClickComplete,
            'prev-student-btn': () => navigateStudent(-1),
            'next-student-btn': () => navigateStudent(1),
            'undo-btn': handleUndo,
            'redo-btn': handleRedo,
            'undo-student-btn': handleUndo,
            'redo-student-btn': handleRedo,
            'sort-btn': handleSortToggle,
        };

        for (const id in eventMap) {
            const element = document.getElementById(id);
            if (element) {
                element.addEventListener('click', eventMap[id]);
            }
        }
        
        toggleGroupViewBtn.addEventListener('click', () => {
            groupView = groupView === 'individual' ? 'all' : 'individual';
            renderGroupStatusTable(groupSelectDropdown.value);
        });

        csvFileInput.addEventListener('change', handleImportCSV);
        studentStatusModal.addEventListener('click', handleInteractiveStatusChange);
        studentSelectDropdown.addEventListener('change', (e) => handleShowStudentStatus(parseInt(e.target.value, 10)));
        groupSelectDropdown.addEventListener('change', (e) => renderGroupStatusTable(e.target.value));
        statusContent.addEventListener('click', (e) => {
            const button = e.target.closest('[data-toggle-id]');
            if(button) {
                const content = document.getElementById(button.dataset.toggleId);
                if (content) toggleCollapsible(content, button);
            }
        });
        groupStatusContent.addEventListener('click', handleGroupTableClick);
        [statusModal, studentStatusModal, confirmModal, batchInputModal, choiceModal, groupStatusModal].forEach(modal => modal.addEventListener('click', e => e.target === modal && closeModal(modal)));
        
        loadData();
    </script>
</body>
</html>
